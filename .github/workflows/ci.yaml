name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Go build + tests
        run: |
          for svc in api-gateway model-registry-service deployment-manager-service model-router-service history-service; do
            (cd services/$svc && go mod download && go test ./... && go build ./...)
          done

      - name: Python smoke check
        run: |
          python -m pip install --upgrade pip
          pip install -r services/timeseries-inference-service/requirements.txt
          python -m py_compile services/timeseries-inference-service/main.py
