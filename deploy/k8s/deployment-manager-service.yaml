apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-manager-service
  namespace: ai-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployment-manager-service
  template:
    metadata:
      labels:
        app: deployment-manager-service
    spec:
      containers:
      - name: deployment-manager-service
        image: ghcr.io/example/deployment-manager-service:latest
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: deployment-manager-service
  namespace: ai-infra
spec:
  selector:
    app: deployment-manager-service
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
