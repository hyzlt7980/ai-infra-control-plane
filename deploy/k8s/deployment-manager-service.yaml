apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployment-manager-service
  namespace: ai-infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-manager-service
  namespace: ai-infra
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployment-manager-service
  namespace: ai-infra
subjects:
  - kind: ServiceAccount
    name: deployment-manager-service
    namespace: ai-infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deployment-manager-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-manager-service
  namespace: ai-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployment-manager-service
  template:
    metadata:
      labels:
        app: deployment-manager-service
    spec:
      serviceAccountName: deployment-manager-service
      containers:
      - name: deployment-manager-service
        image: ghcr.io/example/deployment-manager-service:latest
        ports:
        - containerPort: 8080
        env:
          - name: PLATFORM_NAMESPACE
            value: ai-infra
          - name: DEFAULT_MODEL_IMAGE
            value: ghcr.io/example/timeseries-inference-service:latest
          - name: DEFAULT_CONTAINER_PORT
            value: "8000"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: deployment-manager-service
  namespace: ai-infra
spec:
  selector:
    app: deployment-manager-service
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
