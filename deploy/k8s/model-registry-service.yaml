apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry-service
  namespace: ai-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-registry-service
  template:
    metadata:
      labels:
        app: model-registry-service
    spec:
      containers:
      - name: model-registry-service
        image: ghcr.io/example/model-registry-service:latest
        env:
        - name: STORE_BACKEND
          value: "mysql"
        - name: MYSQL_DSN
          valueFrom:
            secretKeyRef:
              name: ai-infra-data-backends
              key: mysql_dsn
        - name: REDIS_ADDR
          valueFrom:
            secretKeyRef:
              name: ai-infra-data-backends
              key: redis_addr
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ai-infra-data-backends
              key: redis_password
        - name: REDIS_DB
          value: "0"
        - name: CACHE_TTL
          value: "60s"
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: model-registry-service
  namespace: ai-infra
spec:
  selector:
    app: model-registry-service
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
